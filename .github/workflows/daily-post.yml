name: Sally 블로그 자동 생성

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00 전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼도 만들어둠

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests

      - name: 블로그 글 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_post.py

      - name: 결과 커밋
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Sally Blog Bot"
          git add posts/
          git diff --staged --quiet || git commit -m "🤖 오늘의 블로그 글 생성 $(date +'%Y-%m-%d')"
          git push

      - name: 텔레그램 알림 전송
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/send_telegram.py
